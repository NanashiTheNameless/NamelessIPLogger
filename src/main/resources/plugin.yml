name: NamelessIPLogger
version: 0.0.5
main: dev.namelessnanashi.namelessiplogger.PaperPlugin
api-version: '1.18'
author: NanashiTheNameless
description: Correlated IP, identity and connection logger with GeoIP lookups
commands:
  niplookup:
    description: Lookup player/IP correlation data and manage plugin runtime settings.
    usage: /niplookup <uuid|username|ip|reload|updatedb|checkupdates> [value]
    aliases: [niplog, iplookup, iplog]
permissions:
  namelessiplogger.admin:
    description: Allows running /niplookup commands when admin command access is enabled.
    default: op
  namelessiplogger.update.notify:
    description: Receives update notices.
    default: op
